name: libedaw-website

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: libedaw-website:${IMAGE_TAG:-latest}
    container_name: libedaw-web
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:80"
    environment:
      - TZ=${TZ:-Europe/Paris}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      # Traefik labels — used by the CRUD manager reverse proxy
      - "traefik.enable=true"
      - "traefik.http.routers.libedaw-web.rule=Host(`${SITE_DOMAIN}`)"
      - "traefik.http.routers.libedaw-web.entrypoints=websecure"
      - "traefik.http.routers.libedaw-web.tls=true"
      - "traefik.http.routers.libedaw-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.libedaw-web.loadbalancer.server.port=80"

networks:
  default:
    name: ${NETWORK_NAME:-libedaw-web}
    external: ${NETWORK_EXTERNAL:-false}
