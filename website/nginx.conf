server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Serve pre-compressed files if available
    gzip_static on;
    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;

    # Cache static assets aggressively (screenshots, icons, fonts)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Cache CSS/JS with revalidation
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
    }

    # HTML — no cache (so deploys are instant)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store";
    }

    # SPA-style fallback (serves index.html for any unknown path)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;
}
